apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservicio-con-relayer
  labels:
    app: productor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productor
  template:
    metadata:
      labels:
        app: productor
    spec:


      volumes:
        - name: outbox
          emptyDir: {} 


      securityContext:
        fsGroup: 65534

      containers:
        - name: relayer
          image: markitos-it-event-relay:0.0.1

          env:
            - name: BUS_TYPE
              value: "mock"
            - name: DB_PATH
              value: "/var/lib/outbox/events.db"
          volumeMounts:
            - name: outbox
              mountPath: /var/lib/outbox



        - name: microservicio
          image: markitos-it-event-relay-client:0.0.1

          volumeMounts:
            - name: outbox
              mountPath: /var/lib/outbox

          command: ["/app/event-relay-client"]